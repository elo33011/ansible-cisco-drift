[defaults]
inventory          = ./inventory/inventory.ini
host_key_checking  = False
timeout            = 30

# Use the built-in default callback with YAML-formatted output.
# 'stdout_callback = yaml' resolved to the now-deprecated community.general.yaml;
# the correct replacement since ansible-core 2.13 is result_format=yaml here.
stdout_callback    = ansible.builtin.default
result_format      = yaml

# Where Ansible looks for callback plugin .py files.
callback_plugins   = ./callback_plugins

# Notification-type plugins that set CALLBACK_NEEDS_ENABLED = True
# must be listed here.  They run alongside the stdout_callback above.
callback_enabled   = task_timer, drift_reporter

[persistent_connection]
connect_timeout    = 30
command_timeout    = 30
