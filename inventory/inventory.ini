[cisco_iosxe]
# Virtual lab routers (Docker containers – start with: cd lab && docker compose up -d)
router1  ansible_host=127.0.0.1  ansible_port=2221
router2  ansible_host=127.0.0.1  ansible_port=2222
router3  ansible_host=127.0.0.1  ansible_port=2223

# Real devices – uncomment and populate when testing against hardware
# prod-rtr1  ansible_host=192.168.1.1
# prod-rtr2  ansible_host=192.168.1.2

[cisco_iosxe:vars]
ansible_connection=ansible.netcommon.network_cli
ansible_network_os=cisco.ios.ios
ansible_become=yes
ansible_become_method=enable
# Credentials are in group_vars/cisco_iosxe.yml
