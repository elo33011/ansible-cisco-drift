[cisco_iosxe]
# Define your Cisco IOS-XE devices here
# Example:
# device1.example.com ansible_host=192.168.1.1 ansible_user=admin
# device2.example.com ansible_host=192.168.1.2 ansible_user=admin

[cisco_iosxe:vars]
# Common variables for all Cisco IOS-XE devices
ansible_connection=ansible.netcommon.network_cli
ansible_network_os=cisco.ios.ios
ansible_become=yes
ansible_become_method=enable
# Set these in group_vars or host_vars or as extra vars:
# ansible_user=admin
# ansible_password=your_password
# ansible_become_password=enable_password