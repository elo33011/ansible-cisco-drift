---
name: Cisco Drift Detection

on:
  push:
    branches: ["main", "claude/build-cisco-virtual-lab-IkBwU"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:   # allow manual runs from the GitHub UI

jobs:
  drift-detection:
    name: Run drift playbook against virtual lab
    runs-on: ubuntu-latest

    steps:
      # ── checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── python / ansible ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible and Python dependencies
        run: pip install --upgrade -r pip-requirements.txt

      - name: Install required Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      # ── virtual lab ───────────────────────────────────────────────────────
      - name: Build and start mock Cisco devices
        run: docker compose -f lab/docker-compose.yml up -d --build

      - name: Wait for SSH ports to be ready (2221-2223)
        run: |
          # Give the containers a moment to start their processes
          sleep 5
          for port in 2221 2222 2223; do
            echo "Waiting for port ${port}..."
            for attempt in $(seq 1 30); do
              if bash -c "echo > /dev/tcp/127.0.0.1/${port}" 2>/dev/null; then
                echo "  port ${port} is up (attempt ${attempt})"
                break
              fi
              if [ "$attempt" = "30" ]; then
                echo "ERROR: port ${port} did not become ready in time."
                exit 1
              fi
              sleep 1
            done
          done
          echo "All SSH ports ready."

      # ── smoke test ───────────────────────────────────────────────────────
      # Verify each mock device is up and returning a valid config BEFORE
      # Ansible connects. Uses the same paramiko library that network_cli
      # uses so it exercises the same SSH path.
      # NOTE: the mock is a Python asyncssh server, not a real IOS image.
      #       It speaks the Cisco IOS-XE CLI protocol over SSH and serves
      #       the configs from lab/configs/*.cfg.
      - name: Smoke test - verify mock devices respond over SSH
        run: python3 lab/smoke_test.py

      # ── playbook ──────────────────────────────────────────────────────────
      - name: Run detect_drift.yml
        run: ansible-playbook playbooks/detect_drift.yml -vvvv

      # ── results ───────────────────────────────────────────────────────────
      - name: Show drift detection log
        if: always()
        run: |
          echo "── drift_detection.log ──────────────────────────────────"
          cat drift_reports/drift_detection.log 2>/dev/null || echo "(log not created)"
          echo ""
          echo "── per-device reports ───────────────────────────────────"
          for f in drift_reports/*.txt; do
            [ -f "$f" ] || continue
            echo ""; echo "=== $f ==="; cat "$f"
          done

      - name: Upload drift reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-reports
          path: drift_reports/
          if-no-files-found: warn

      # ── debug: show container logs if something failed ───────────────────
      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "── router1 logs ─────────────────────────────────────────"
          docker compose -f lab/docker-compose.yml logs router1 || true
          echo "── router2 logs ─────────────────────────────────────────"
          docker compose -f lab/docker-compose.yml logs router2 || true
          echo "── router3 logs ─────────────────────────────────────────"
          docker compose -f lab/docker-compose.yml logs router3 || true

      # ── cleanup ───────────────────────────────────────────────────────────
      - name: Stop virtual lab containers
        if: always()
        run: docker compose -f lab/docker-compose.yml down
