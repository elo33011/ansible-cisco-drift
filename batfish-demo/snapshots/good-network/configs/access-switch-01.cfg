!
! ============================================================
! access-switch-01 - Access Layer Switch
! Role: End-user port connectivity, VLAN segmentation
! ============================================================
!
hostname access-switch-01
!
! --- VLANs ---
vlan 10
 name Servers
!
vlan 20
 name Users
!
vlan 100
 name Management
!
! --- Trunk Uplink to Distribution ---
interface GigabitEthernet0/0
 description Trunk Uplink to Dist-Switch-01 Gi0/2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 10,20,100
 spanning-tree portfast trunk
 no shutdown
!
! --- User Access Ports ---
interface GigabitEthernet0/1
 description User Workstation Port 1
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 spanning-tree bpduguard enable
 no shutdown
!
interface GigabitEthernet0/2
 description User Workstation Port 2
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 spanning-tree bpduguard enable
 no shutdown
!
! --- Server Ports ---
interface GigabitEthernet0/3
 description Server Port 1
 switchport mode access
 switchport access vlan 10
 no shutdown
!
interface GigabitEthernet0/4
 description Server Port 2
 switchport mode access
 switchport access vlan 10
 no shutdown
!
! --- Management SVI ---
interface Vlan100
 description Management Interface
 ip address 10.100.100.10 255.255.255.0
 no shutdown
!
ip default-gateway 10.100.100.1
!
