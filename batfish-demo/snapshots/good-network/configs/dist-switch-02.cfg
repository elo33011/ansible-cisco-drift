!
! ============================================================
! dist-switch-02 - Distribution Switch 2
! Role: Redundant distribution layer, same policies as dist-sw-01
! ============================================================
!
hostname dist-switch-02
!
ip routing
!
! --- Loopback ---
interface Loopback0
 description Router ID
 ip address 10.255.1.2 255.255.255.255
!
! --- Uplinks to Core Layer ---
interface GigabitEthernet0/0
 description Uplink to Core-Router-01 Gi0/3
 ip address 10.0.3.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description Uplink to Core-Router-02 Gi0/3
 ip address 10.0.3.6 255.255.255.252
 no shutdown
!
! --- VLAN SVIs ---
interface Vlan10
 description Server VLAN - Backup Gateway
 ip address 10.10.10.2 255.255.255.0
 ip access-group SERVER_ACL in
 no shutdown
!
interface Vlan20
 description User VLAN - Backup Gateway
 ip address 10.20.20.2 255.255.255.0
 no shutdown
!
interface Vlan100
 description Management VLAN
 ip address 10.100.100.2 255.255.255.0
 no shutdown
!
! --- OSPF ---
router ospf 1
 router-id 10.255.1.2
 network 10.0.3.0 0.0.0.3 area 0
 network 10.0.3.4 0.0.0.3 area 0
 network 10.10.10.0 0.0.0.255 area 0
 network 10.20.20.0 0.0.0.255 area 0
 network 10.100.100.0 0.0.0.255 area 0
 network 10.255.1.2 0.0.0.0 area 0
!
! --- Server Protection ACL (must match dist-switch-01) ---
ip access-list extended SERVER_ACL
 remark Users may access servers via HTTP/HTTPS/SSH
 permit tcp 10.20.20.0 0.0.0.255 10.10.10.0 0.0.0.255 eq 80
 permit tcp 10.20.20.0 0.0.0.255 10.10.10.0 0.0.0.255 eq 443
 permit tcp 10.20.20.0 0.0.0.255 10.10.10.0 0.0.0.255 eq 22
 remark Management may SSH to servers
 permit tcp 10.100.100.0 0.0.0.255 10.10.10.0 0.0.0.255 eq 22
 remark Block everything else to servers
 deny   ip any 10.10.10.0 0.0.0.255 log
 permit ip any any
!
