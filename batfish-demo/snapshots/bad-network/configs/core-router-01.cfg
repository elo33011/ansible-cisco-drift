!
! ============================================================
! core-router-01 - Core Router 1
! BUG #1: Static Null0 route creates black hole for server subnet
!         -> All traffic to 10.10.10.0/24 is silently dropped
! ============================================================
!
hostname core-router-01
!
ip routing
!
interface Loopback0
 description Router ID and BGP update source
 ip address 10.255.0.1 255.255.255.255
!
interface GigabitEthernet0/0
 description Link to Firewall-01 Gi0/1
 ip address 10.0.0.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description iBGP Core Link to Core-Router-02 Gi0/1
 ip address 10.0.1.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description Link to Dist-Switch-01 Gi0/0
 ip address 10.0.2.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/3
 description Link to Dist-Switch-02 Gi0/0
 ip address 10.0.3.1 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 10.255.0.1
 network 10.0.0.0 0.0.0.3 area 0
 network 10.0.1.0 0.0.0.3 area 0
 network 10.0.2.0 0.0.0.3 area 0
 network 10.0.3.0 0.0.0.3 area 0
 network 10.255.0.1 0.0.0.0 area 0
!
router bgp 65001
 bgp router-id 10.255.0.1
 bgp log-neighbor-changes
 neighbor 10.255.0.2 remote-as 65001
 neighbor 10.255.0.2 update-source Loopback0
 neighbor 10.255.0.2 description iBGP peer Core-Router-02
 !
 address-family ipv4
  neighbor 10.255.0.2 activate
  neighbor 10.255.0.2 next-hop-self
 exit-address-family
!
! BUG: This static route sends all server traffic to Null0 (black hole).
!      The more-specific /24 static overrides the OSPF-learned route.
ip route 10.10.10.0 255.255.255.0 Null0
!
ip access-list extended MGMT_ACCESS
 permit tcp 10.100.100.0 0.0.0.255 any eq 22
 deny   tcp any any eq 22 log
 permit ip any any
!
