!
! ============================================================
! firewall-01 - Edge Firewall / Border Router
! BUG #4: WAN_IN permits all traffic before any deny rules
!         -> Internet can reach any internal host (no filtering)
! ============================================================
!
hostname firewall-01
!
ip routing
!
interface GigabitEthernet0/0
 description WAN - Internet Uplink (ISP)
 ip address 203.0.113.2 255.255.255.252
 ip access-group WAN_IN in
 no shutdown
!
interface GigabitEthernet0/1
 description LAN - Link to Core-Router-01 Gi0/0
 ip address 10.0.0.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description LAN - Link to Core-Router-02 Gi0/0
 ip address 10.0.0.5 255.255.255.252
 no shutdown
!
ip route 0.0.0.0 0.0.0.0 203.0.113.1
!
router ospf 1
 router-id 10.255.0.254
 passive-interface GigabitEthernet0/0
 network 10.0.0.0 0.0.0.3 area 0
 network 10.0.0.4 0.0.0.3 area 0
 default-information originate always
!
! BUG: permit ip any any is placed FIRST, before all the deny rules.
!      This means every internet packet is allowed through.
!      All rules below are shadowed and will never match.
ip access-list extended WAN_IN
 permit ip any any
 deny   ip 10.0.0.0 0.255.255.255 any log
 deny   ip 172.16.0.0 0.15.255.255 any log
 deny   ip 192.168.0.0 0.0.255.255 any log
 permit tcp any any established
 permit icmp any any echo-reply
 deny   ip any any log
!
