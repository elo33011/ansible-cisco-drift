!
! ============================================================
! dist-switch-01 - Distribution Switch 1
! BUG #2: SERVER_ACL deny rule is placed BEFORE the permit rules.
!         All traffic from users and management to servers is blocked.
!         The permit rules below the deny are shadowed (unreachable).
! ============================================================
!
hostname dist-switch-01
!
ip routing
!
interface Loopback0
 description Router ID
 ip address 10.255.1.1 255.255.255.255
!
interface GigabitEthernet0/0
 description Uplink to Core-Router-01 Gi0/2
 ip address 10.0.2.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description Uplink to Core-Router-02 Gi0/2
 ip address 10.0.2.6 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description Downlink to Access-Switch-01 Gi0/0
 ip address 10.0.4.1 255.255.255.252
 no shutdown
!
interface Vlan10
 description Server VLAN
 ip address 10.10.10.1 255.255.255.0
 ip access-group SERVER_ACL in
 no shutdown
!
interface Vlan20
 description User VLAN
 ip address 10.20.20.1 255.255.255.0
 no shutdown
!
interface Vlan100
 description Management VLAN
 ip address 10.100.100.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.255.1.1
 network 10.0.2.0 0.0.0.3 area 0
 network 10.0.2.4 0.0.0.3 area 0
 network 10.0.4.0 0.0.0.3 area 0
 network 10.10.10.0 0.0.0.255 area 0
 network 10.20.20.0 0.0.0.255 area 0
 network 10.100.100.0 0.0.0.255 area 0
 network 10.255.1.1 0.0.0.0 area 0
!
! BUG: deny rule appears before all permit rules.
!      Lines 3-6 below are shadowed and can never be matched.
ip access-list extended SERVER_ACL
 remark Block everything to servers  <-- WRONG: should be last
 deny   ip any 10.10.10.0 0.0.0.255 log
 remark These permits are now unreachable (shadowed by the deny above)
 permit tcp 10.20.20.0 0.0.0.255 10.10.10.0 0.0.0.255 eq 80
 permit tcp 10.20.20.0 0.0.0.255 10.10.10.0 0.0.0.255 eq 443
 permit tcp 10.20.20.0 0.0.0.255 10.10.10.0 0.0.0.255 eq 22
 permit tcp 10.100.100.0 0.0.0.255 10.10.10.0 0.0.0.255 eq 22
 permit ip any any
!
