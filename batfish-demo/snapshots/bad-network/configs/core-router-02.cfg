!
! ============================================================
! core-router-02 - Core Router 2
! (No bugs on this device)
! ============================================================
!
hostname core-router-02
!
ip routing
!
interface Loopback0
 description Router ID and BGP update source
 ip address 10.255.0.2 255.255.255.255
!
interface GigabitEthernet0/0
 description Link to Firewall-01 Gi0/2
 ip address 10.0.0.6 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description iBGP Core Link to Core-Router-01 Gi0/1
 ip address 10.0.1.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description Link to Dist-Switch-01 Gi0/1
 ip address 10.0.2.5 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/3
 description Link to Dist-Switch-02 Gi0/1
 ip address 10.0.3.5 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 10.255.0.2
 network 10.0.0.4 0.0.0.3 area 0
 network 10.0.1.0 0.0.0.3 area 0
 network 10.0.2.4 0.0.0.3 area 0
 network 10.0.3.4 0.0.0.3 area 0
 network 10.255.0.2 0.0.0.0 area 0
!
router bgp 65001
 bgp router-id 10.255.0.2
 bgp log-neighbor-changes
 neighbor 10.255.0.1 remote-as 65001
 neighbor 10.255.0.1 update-source Loopback0
 neighbor 10.255.0.1 description iBGP peer Core-Router-01
 !
 address-family ipv4
  neighbor 10.255.0.1 activate
  neighbor 10.255.0.1 next-hop-self
 exit-address-family
!
ip access-list extended MGMT_ACCESS
 permit tcp 10.100.100.0 0.0.0.255 any eq 22
 deny   tcp any any eq 22 log
 permit ip any any
!
