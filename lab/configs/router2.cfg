!
version 17.3
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname router2
!
boot-start-marker
boot-end-marker
!
enable secret 9 $9$JRXOqpTvqzLIpE$example/hash/value
!
aaa new-model
!
aaa authentication login default local
aaa authorization exec default local
!
ip cef
no ipv6 cef
!
username admin privilege 15 secret 9 $9$adminexamplehash
!
ip domain name lab.local
ip ssh version 2
!
interface GigabitEthernet1
 description Management
 ip address 10.0.0.12 255.255.255.0
 no shutdown
!
interface GigabitEthernet2
 description WAN-Uplink
 ip address 192.168.100.5 255.255.255.252
 no shutdown
!
interface GigabitEthernet3
 description LAN-Users
 ip address 172.16.2.1 255.255.255.0
 no shutdown
!
! DRIFT-1: Unauthorized loopback added by unknown change
interface Loopback0
 description UNAUTHORIZED-backdoor
 ip address 10.99.99.1 255.255.255.255
!
ip route 0.0.0.0 0.0.0.0 10.0.0.1
!
! DRIFT-2: NTP server changed away from approved server
ntp server 8.8.8.8
!
snmp-server community public RO
! DRIFT-3: Unauthorized SNMP read-write community added
snmp-server community s3cr3t RW
snmp-server location DC1-Lab-Rack2
snmp-server contact noc@lab.local
!
logging host 10.0.0.200
logging trap notifications
!
banner motd ^
==============================================
 WARNING: Authorized Access Only
 Unauthorized access is prohibited and
 subject to criminal prosecution.
==============================================
^
!
line con 0
 logging synchronous
 login local
!
line vty 0 4
 login local
 transport input ssh
!
end
